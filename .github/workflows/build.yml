name: GpsMocker Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle | sed 's/[^0-9]*//g')
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "### Build Info" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| App Version | v${VERSION_NAME} (code ${VERSION_CODE}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | ${{ github.ref_name }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Get APK info
        id: apk
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "size=$SIZE" >> "$GITHUB_OUTPUT"
            echo "### Build Result" >> "$GITHUB_STEP_SUMMARY"
            echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Status | Success |" >> "$GITHUB_STEP_SUMMARY"
            echo "| APK Size | ${SIZE}B |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpsmock-v${{ steps.version.outputs.name }}-build${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-c${{ steps.version.outputs.code }}
          name: GPS Mocker v${{ steps.version.outputs.name }}
          body: |
            **Version**: v${{ steps.version.outputs.name }} (code ${{ steps.version.outputs.code }})
            **Build**: #${{ github.run_number }}

            ## Installation
            1. Download `app-debug.apk` below
            2. Install on your Android device
            3. Go to Settings > Developer Options > Select mock location app > GPS Mocker
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
